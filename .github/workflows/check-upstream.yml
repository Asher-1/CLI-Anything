name: Check Upstream Updates

# 定期检查上游仓库是否有新的提交
# 如果有更新,写入 Job Summary 并发出 warning annotation

on:
  schedule:
    # 每天 UTC 时间 00:00 运行 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/HKUDS/CLI-Anything.git || true
          git fetch upstream
      
      - name: Check for upstream updates
        id: check_updates
        run: |
          # 获取上游和本地的最新提交
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          LOCAL_COMMIT=$(git rev-parse origin/main)
          
          echo "upstream_commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          echo "local_commit=$LOCAL_COMMIT" >> $GITHUB_OUTPUT
          
          if [ "$UPSTREAM_COMMIT" != "$LOCAL_COMMIT" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            
            # 计算差异
            COMMITS_BEHIND=$(git rev-list --count HEAD..upstream/main)
            COMMITS_AHEAD=$(git rev-list --count upstream/main..HEAD)
            
            echo "commits_behind=$COMMITS_BEHIND" >> $GITHUB_OUTPUT
            echo "commits_ahead=$COMMITS_AHEAD" >> $GITHUB_OUTPUT
            
            # 获取上游新提交的摘要
            echo "## 上游新提交" > /tmp/upstream_commits.md
            git log --oneline --no-merges HEAD..upstream/main >> /tmp/upstream_commits.md
            
            echo "✅ 发现上游有 $COMMITS_BEHIND 个新提交"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ 已与上游同步"
          fi
      
      - name: Check for conflicts
        id: check_conflicts
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          # 尝试 dry-run merge 来检测潜在冲突
          git merge --no-commit --no-ff upstream/main > /tmp/merge_output.txt 2>&1 || true
          
          if git diff --name-only --diff-filter=U > /tmp/conflicts.txt 2>/dev/null; then
            if [ -s /tmp/conflicts.txt ]; then
              echo "has_conflicts=true" >> $GITHUB_OUTPUT
              echo "## 潜在冲突文件" > /tmp/conflict_files.md
              cat /tmp/conflicts.txt >> /tmp/conflict_files.md
            else
              echo "has_conflicts=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          fi
          
          # 清理 merge 尝试
          git merge --abort 2>/dev/null || true
      
      - name: Write sync report to Job Summary
        if: steps.check_updates.outputs.has_updates == 'true'
        run: |
          COMMITS_BEHIND="${{ steps.check_updates.outputs.commits_behind }}"
          COMMITS_AHEAD="${{ steps.check_updates.outputs.commits_ahead }}"
          HAS_CONFLICTS="${{ steps.check_conflicts.outputs.has_conflicts }}"

          UPSTREAM_COMMITS=$(cat /tmp/upstream_commits.md 2>/dev/null || echo "(none)")
          CONFLICT_FILES=""
          if [ "$HAS_CONFLICTS" = "true" ]; then
            CONFLICT_FILES=$(cat /tmp/conflict_files.md 2>/dev/null || echo "(none)")
          fi

          if [ "$HAS_CONFLICTS" = "true" ]; then
            CONFLICT_BADGE="⚠️ 可能存在冲突"
          else
            CONFLICT_BADGE="✅ 无明显冲突"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # 🔄 上游同步提醒

          上游仓库 [HKUDS/CLI-Anything](https://github.com/HKUDS/CLI-Anything) 有新的提交可以同步。

          ## 📊 同步状态

          | 指标 | 值 |
          |------|-----|
          | **落后上游** | ${COMMITS_BEHIND} 个提交 |
          | **领先上游** | ${COMMITS_AHEAD} 个提交 |
          | **预测冲突** | ${CONFLICT_BADGE} |

          ${UPSTREAM_COMMITS}

          ${CONFLICT_FILES}

          ## 🚀 如何同步

          ### 方法 1: 使用自动化脚本 (推荐)

          \`\`\`bash
          ./sync-upstream.sh --merge   # merge 策略 (有冲突时)
          ./sync-upstream.sh --ours    # ours 策略 (保留本地)
          ./sync-upstream.sh           # rebase 策略 (默认,历史更整洁)
          \`\`\`

          ### 方法 2: 手动同步

          \`\`\`bash
          git fetch upstream
          git checkout main
          git merge upstream/main   # 或 git rebase upstream/main
          \`\`\`

          ## 📚 相关文档

          - [详细同步指南](./SYNC_UPSTREAM.md)
          - [快速参考](./SYNC_QUICK_REF.md)
          EOF

          if [ "$HAS_CONFLICTS" = "true" ]; then
            cat >> "$GITHUB_STEP_SUMMARY" <<'WARN_EOF'

          ## ⚠️ 检测到潜在冲突

          同步过程可能需要手动解决冲突。建议:

          1. 先创建备份分支
          2. 使用 merge 策略而不是 rebase
          3. 仔细审查冲突文件
          4. 同步后运行完整测试
          WARN_EOF
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "*此报告由 GitHub Actions 自动生成。上次检查: $(date -u +%Y-%m-%dT%H:%M:%SZ)*" >> "$GITHUB_STEP_SUMMARY"

          echo "::warning::上游仓库有 ${COMMITS_BEHIND} 个新提交可同步 (冲突: ${HAS_CONFLICTS})"
      
      - name: Create or update sync PR
        if: steps.check_updates.outputs.has_updates == 'true' && steps.check_updates.outputs.commits_behind != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMITS_BEHIND="${{ steps.check_updates.outputs.commits_behind }}"
          HAS_CONFLICTS="${{ steps.check_conflicts.outputs.has_conflicts }}"
          SYNC_BRANCH="auto/sync-upstream"

          EXISTING_PR=$(gh pr list --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)

          if [ "$HAS_CONFLICTS" = "true" ]; then
            echo "⚠️ 存在冲突，跳过自动 merge，仅更新 PR body"
            if [ -n "$EXISTING_PR" ]; then
              UPSTREAM_LOG=$(cat /tmp/upstream_commits.md 2>/dev/null || echo "(none)")
              CONFLICTS=$(cat /tmp/conflict_files.md 2>/dev/null || echo "(none)")
              gh pr comment "$EXISTING_PR" --body "$(cat <<COMMENT_EOF
          🔄 上游检测到 ${COMMITS_BEHIND} 个新提交，但存在冲突，请手动解决。

          ${CONFLICTS}
          COMMENT_EOF
          )"
            fi
            echo "::warning::存在冲突，无法自动创建 sync PR，请手动同步"
            exit 0
          fi

          git checkout -B "$SYNC_BRANCH" origin/main
          git merge upstream/main --no-edit -m "chore: merge upstream/main (${COMMITS_BEHIND} commits)"

          git push -u origin "$SYNC_BRANCH" --force

          UPSTREAM_LOG=$(cat /tmp/upstream_commits.md 2>/dev/null || echo "(none)")

          PR_BODY=$(cat <<'PR_EOF'
          ## Description

          自动同步上游仓库 [HKUDS/CLI-Anything](https://github.com/HKUDS/CLI-Anything) 的最新更改。

          ## Type of Change

          - [x] **Other** — upstream sync (auto-generated)

          ---

          PR_EOF
          )

          PR_BODY="${PR_BODY}

          ### 📊 同步状态

          - **新增上游提交**: ${COMMITS_BEHIND} 个
          - **预测冲突**: ✅ 无冲突 (已自动 merge)

          ${UPSTREAM_LOG}

          ### General Checklist

          - [x] Code follows existing patterns and conventions
          - [ ] I have tested my changes locally

          ## Test Results

          > 请在 merge 前本地运行测试确认无回归。

          ---
          *此 PR 由 GitHub Actions 自动创建/更新。*"

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
            echo "✅ 更新了 PR #${EXISTING_PR}"
          else
            gh pr create \
              --title "🔄 Sync upstream: ${COMMITS_BEHIND} new commits from HKUDS/CLI-Anything" \
              --body "$PR_BODY" \
              --head "$SYNC_BRANCH" \
              --base main \
              --label "upstream-sync"
            echo "✅ 创建了新的 sync PR"
          fi

      - name: Summary
        run: |
          if [ "${{ steps.check_updates.outputs.has_updates }}" == "true" ]; then
            echo "✅ 检测到上游更新,已写入 Job Summary 并创建/更新 sync PR"
            echo "   - 落后: ${{ steps.check_updates.outputs.commits_behind }} 个提交"
            echo "   - 领先: ${{ steps.check_updates.outputs.commits_ahead }} 个提交"
            echo "   - 冲突: ${{ steps.check_conflicts.outputs.has_conflicts }}"
          else
            echo "✅ 已与上游同步,无需操作"
          fi
